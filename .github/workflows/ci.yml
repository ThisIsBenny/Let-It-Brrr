name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: 2.7.9
          cache: true

      - name: Run lint
        run: deno lint

      - name: Run fmt check
        run: deno fmt --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: 2.7.9
          cache: true

      - name: Copy mappings file
        run: cp config/mappings.example.yaml config/mappings.yaml

      - name: Run tests
        run: deno test --coverage --allow-read --allow-net=api.brrr.now,127.0.0.1 --allow-env=LOG_LEVEL,PORT,BRRR_SECRET,BRRR_WEBHOOK_URL,MAPPINGS_FILE
